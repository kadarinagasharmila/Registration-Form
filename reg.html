<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        h1, h3 {
            color: #2c3e50;
        }

        table {
            background-color: #ffffff;
            border-collapse: collapse;
            margin-top: 20px;
        }

        td {
            padding: 8px;
        }

        input, textarea, select {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #999;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }

        .register {
            background-color: #27ae60;
        }

        .clear {
            background-color: #e74c3c;
        }

        .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <h1 align="center">DevOps Lab</h1>
    <h3 align="center">Student Registration Form</h3>

    <form>
        <table border="1" align="center" cellpadding="5">
            <tr>
                <td>Name</td>
                <td><input type="text" size="25"></td>
            </tr>

            <tr>
                <td>Contact Number</td>
                <td><input type="number" size="25"></td>
            </tr>

            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </td>
            </tr>

            <tr>
                <td>Address</td>
                <td><textarea rows="3" cols="25"></textarea></td>
            </tr>

            <tr>
                <td>Hobbies</td>
                <td>
                    <input type="checkbox"> Singing
                    <input type="checkbox"> Dancing
                    <input type="checkbox"> Reading
                </td>
            </tr>

            <tr>
                <td>Skills</td>
                <td>
                    <input type="checkbox"> C
                    <input type="checkbox"> Python
                    <input type="checkbox"> Java
                </td>
            </tr>

            <tr>
                <td>Higher Education</td>
                <td>
                    <select>
                        <option>--Select--</option>
                        <option>DevOps</option>
                        <option>Cloud Computing</option>
                        <option>Data Science</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>District</td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Register" class="btn register">
                    <input type="reset" value="Clear" class="btn clear">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
